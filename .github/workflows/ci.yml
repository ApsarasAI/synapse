name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    strategy:
      matrix:
        os: [ubuntu-latest]
        rust: [stable]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux sandbox dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap strace curl ripgrep python3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Quickstart Smoke
        run: scripts/quickstart_smoke.sh
