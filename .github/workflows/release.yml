name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release -p synapse-cli --bin synapse

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp target/release/synapse dist/synapse
          tar -C dist -czf dist/synapse-linux-x86_64.tar.gz synapse
          sha256sum dist/synapse-linux-x86_64.tar.gz > dist/synapse-linux-x86_64.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/synapse-linux-x86_64.tar.gz
            dist/synapse-linux-x86_64.sha256
          generate_release_notes: true
